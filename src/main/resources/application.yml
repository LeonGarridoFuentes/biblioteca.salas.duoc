server:
  port: 8081

spring:
  application:
    name: biblioteca-salas-service

  datasource:
    url: jdbc:mysql://localhost:3306/db_biblioteca
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true

instance:
  prefer-ip-address: true